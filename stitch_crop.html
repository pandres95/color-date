<body class="font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-full bg-[#FAFAFA] dark:bg-[#1A1C1C] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#1A1C1C]/5 dark:hover:bg-[#F9F9F9]/5 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-[#1A1C1C] dark:text-[#F9F9F9]">close</span>
</button>
</div>
<h1 class="font-serif text-2xl lowercase tracking-tighter text-[#1A1C1C] dark:text-[#F9F9F9]">COLOUR DATE</h1>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#1A1C1C]/5 dark:hover:bg-[#F9F9F9]/5 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-[#1A1C1C] dark:text-[#F9F9F9]">file_download</span>
</button>
</div>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 flex flex-col items-start max-w-2xl mx-auto">
<!-- Page Title -->
<div class="mb-12">
<p class="font-label uppercase tracking-[0.2em] text-xs text-on-surface-variant mb-2">Editor</p>
<h2 class="font-headline text-4xl text-on-surface">Crop Photo</h2>
</div>
<!-- Cropping Viewport -->
<div class="relative w-full aspect-square bg-surface-container-low ring-1 ring-outline-variant/10 overflow-hidden">
<!-- Grid Overlay (Editorial Guide) -->
<div class="absolute inset-0 z-10 pointer-events-none grid grid-cols-3 grid-rows-3 opacity-30">
<div class="border-r border-b border-on-surface"></div>
<div class="border-r border-b border-on-surface"></div>
<div class="border-b border-on-surface"></div>
<div class="border-r border-b border-on-surface"></div>
<div class="border-r border-b border-on-surface"></div>
<div class="border-b border-on-surface"></div>
<div class="border-r border-on-surface"></div>
<div class="border-r border-on-surface"></div>
<div></div>
</div>
<!-- Subject Image -->
<img alt="Urban architecture with minimalist lines" class="w-full h-full object-cover grayscale brightness-90 hover:brightness-100 transition-all duration-700" data-alt="Modern urban street view with sharp architectural lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuACzA83Coo1n55X--n0jarqOUXxLjfd-_yZiyayX8sl6rwqlMEFGWppmIfZ5OMYt5TPXnfcCLDSdxzSwQbsG_Grw1zWkEh2hTqY0getSJuc1RauhnS91zoDd7bzLmSTd7zqb8ADjlXtXSN_Phd2oB0KBBus7A1ZTErZsBStqLq5FHfGDTJ-1bVyWb4yrPwvOUA-gLVktABtvr0BoE-oAwuOiZwhBGc7rOQUGOqMdV7U9RlXlQgxhzuM1Z_x4Gx1xTV6ueyW65bQhWM"/>
<!-- Interaction Cues (Corners) -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-primary z-20"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-primary z-20"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-primary z-20"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-primary z-20"></div>
</div>
<!-- Instructions/Controls Cluster -->
<div class="w-full mt-10 grid grid-cols-2 gap-8">
<div class="flex flex-col gap-2">
<span class="font-label uppercase tracking-[0.2em] text-[10px] text-on-surface-variant">Action</span>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-sm">pan_tool</span>
<span class="font-label uppercase tracking-[0.15em] text-xs">Pan to frame</span>
</div>
</div>
<div class="flex flex-col gap-2">
<span class="font-label uppercase tracking-[0.2em] text-[10px] text-on-surface-variant">Method</span>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-sm">pinch</span>
<span class="font-label uppercase tracking-[0.15em] text-xs">Zoom to focus</span>
</div>
</div>
</div>
<!-- Aspect Ratio Selection (Editorial Choice) -->
<div class="w-full mt-12">
<span class="font-label uppercase tracking-[0.2em] text-[10px] text-on-surface-variant block mb-4">Ratio</span>
<div class="flex gap-6">
<button class="font-label uppercase tracking-[0.15em] text-xs border-b-2 border-primary pb-1">1:1 Square</button>
<button class="font-label uppercase tracking-[0.15em] text-xs text-on-surface-variant hover:text-primary transition-colors pb-1">4:5 Portrait</button>
<button class="font-label uppercase tracking-[0.15em] text-xs text-on-surface-variant hover:text-primary transition-colors pb-1">16:9 Cinema</button>
</div>
</div>
<!-- Confirm Action -->
<div class="fixed bottom-0 left-0 w-full bg-[#FAFAFA]/90 backdrop-blur-md px-6 py-8 flex flex-col items-center">
<button class="w-full max-w-md bg-primary text-on-primary font-label uppercase tracking-[0.2em] text-sm py-5 hover:bg-primary-fixed-dim transition-colors active:scale-[0.98] duration-150">
                CONFIRM CROP
            </button>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused task: Transactional/Task-Focused) -->
