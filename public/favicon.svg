<!-- 
  Colour Date PWA - Android Adaptive Icon
  Design System: Aura Editorial / VSCO Minimalist Aesthetic
  
  Technical Specs:
  - Viewport: 108x108 (Android Standard)
  - Safe Zone: 72x72 centered (Circular Mask)
  - Style: Geometric, Overlay, Editorial
-->

<svg width="108" height="108" viewBox="0 0 108 108" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <!-- LAYER 1: BACKGROUND (Solid Warm Off-White #FAFAFA) -->
  <rect width="108" height="108" fill="#FAFAFA"/>

  <!-- LAYER 2: FOREGROUND (Core Logo Mark within 72px safe zone) -->
  <g id="foreground_mark">
    
    <!-- Viewfinder Brackets (Charcoal Gray #1A1A1A) -->
    <!-- Top Left -->
    <path d="M34 34H28V40" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="square"/>
    <!-- Top Right -->
    <path d="M74 34H80V40" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="square"/>
    <!-- Bottom Left -->
    <path d="M34 74H28V68" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="square"/>
    <!-- Bottom Right -->
    <path d="M74 74H80V68" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="square"/>

    <!-- Intersecting Abstract Shapes: Shared Colour Curated -->
    <!-- Shape A: Ladrillo Salmona (#9C453B) - Representing Bogotá -->
    <rect x="38" y="40" width="24" height="24" fill="#9C453B" fill-opacity="0.8"/>
    
    <!-- Shape B: Bleu Pastel (#7A9BAB) - Representing Toulouse -->
    <circle cx="62" cy="62" r="14" fill="#7A9BAB" fill-opacity="0.8"/>
    
    <!-- Precision Center Point -->
    <rect x="53.5" y="53.5" width="1" height="1" fill="#1A1A1A"/>
    
  </g>

</svg>